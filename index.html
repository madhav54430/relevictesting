<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Static Pay Button Page</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f7fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 400px;
      text-align: center;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 12px;
    }
    .messages {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .pay-btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .success {
      display: none;
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      background: #ecfdf5;
      color: #059669;
      font-weight: 600;
    }
    /* Show success message when targeted */
    #success:target {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Complete your purchase</h1>
    <div class="messages">
      Customary message: You are purchasing a single-user license. No hidden fees.
    </div>
    <a href="#success" class="pay-btn">Pay $9.99</a>
    <div id="success" class="success">Payment successful — thank you!</div>
  </div>
</body>
</html>
